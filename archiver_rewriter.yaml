apiVersion: apps/v1
kind: Deployment
metadata:
  name: archiver-rewriter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archiver-rewriter
  template:
    metadata:
      labels:
        app: archiver-rewriter
    spec:
      containers:
        - name: archiver-rewriter
          image: markjefferyap/archiver-rewriter:4
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: TARGET_BASE_URL
              value: "https://play.dbmarlin.com"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: archiver-rewriter
spec:
  selector:
    app: archiver-rewriter
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort
