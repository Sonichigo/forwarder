apiVersion: apps/v1
kind: Deployment
metadata:
  name: forwarder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forwarder
  template:
    metadata:
      labels:
        app: forwarder
    spec:
      containers:
        - name: forwarder
          image: ghcr.io/sonichigo/forwarder:1
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: TARGET_BASE_URL
              value: "https://play.dbmarlin.com"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forwarder
spec:
  selector:
    app: forwarder
  ports:
    - port: 8081
      targetPort: 8081
  type: NodePort
